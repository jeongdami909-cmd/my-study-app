<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Orange Vault</title>
    <style>
        :root {
            --bg-color: #f7f3f0; /* 매우 연한 베이지/오렌지 바탕 */
            --card-bg: #ffffff;
            --point-orange: #f2a172; /* 은은한 오렌지 포인트 */
            --soft-orange: #fdf2eb;
            --text-dark: #4a4a4a;
            --text-light: #9a9a9a;
        }

        body { 
            background-color: var(--bg-color);
            font-family: 'Pretendard', -apple-system, sans-serif;
            margin: 0; color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
        }

        /* 상단 메뉴 - 미니멀 스타일 */
        nav {
            display: flex; justify-content: center; gap: 10px;
            padding: 20px; background: var(--bg-color);
            position: sticky; top: 0; z-index: 10;
        }
        nav button {
            background: white; border: 1px solid #eee;
            padding: 8px 18px; border-radius: 50px;
            font-size: 0.85em; color: var(--text-dark);
            cursor: pointer; transition: 0.2s;
        }
        nav button.active {
            background: var(--point-orange);
            color: white; border-color: var(--point-orange);
            box-shadow: 0 4px 10px rgba(242, 161, 114, 0.3);
        }

        .container { width: 90%; max-width: 500px; margin: 0 auto; }

        /* 입력창 - 그림자 없는 미니멀 스타일 */
        .editor-card {
            background: var(--card-bg); border-radius: 16px;
            padding: 20px; border: 1px solid #efefef;
            margin-bottom: 30px;
        }
        input, textarea {
            width: 100%; border: 1px solid #f0f0f0; border-radius: 10px;
            padding: 12px; margin-bottom: 10px; box-sizing: border-box;
            background: #fafafa; font-size: 0.95em; outline: none;
        }
        .main-btn {
            width: 100%; padding: 14px; border: none; border-radius: 10px;
            background: var(--point-orange); color: white;
            font-weight: 600; cursor: pointer;
        }

        /* 게시글 카드 - 미니멀리즘 강조 */
        .post-card {
            background: var(--card-bg); border-radius: 16px;
            padding: 20px; margin-bottom: 16px;
            border: 1px solid #efefef;
            transition: transform 0.2s;
        }
        .post-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .post-category { 
            font-size: 0.7em; font-weight: bold; color: var(--point-orange);
            background: var(--soft-orange); padding: 4px 10px; border-radius: 20px;
        }
        .control-btn { font-size: 0.7em; color: var(--text-light); background: none; border: none; cursor: pointer; }
        
        .post-content { line-height: 1.6; font-size: 0.95em; color: #555; }
        .post-link { display: block; margin-top: 10px; font-size: 0.8em; color: #a18a7d; text-decoration: none; }
        .post-date { font-size: 0.7em; color: #ccc; margin-top: 15px; }
    </style>
</head>
<body>
    <nav id="menuNav">
        <button onclick="setCategory('의학')" id="menu-의학">의학</button>
        <button onclick="setCategory('시사')" id="menu-시사">시사</button>
        <button onclick="setCategory('과학')" id="menu-과학">과학</button>
        <button onclick="setCategory('인물')" id="menu-인물">인물</button>
        <button onclick="setCategory('New Fields')" id="menu-New Fields">New Fields</button>
        <button onclick="setCategory('전체')" id="menu-전체" class="active">전체</button>
    </nav>

    <div class="container">
        <div class="editor-card">
            <input type="text" id="postLink" placeholder="🔗 사진/링크 주소">
            <textarea id="postContent" placeholder="기록하고 싶은 내용을 작성하세요."></textarea>
            <button class="main-btn" onclick="savePost()">기록하기</button>
        </div>
        <div id="board"></div>
    </div>

    <script>
        let currentCategory = '전체';

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(`menu-${cat}`).classList.add('active');
            renderPosts();
        }

        function savePost() {
            const content = document.getElementById('postContent').value;
            const link = document.getElementById('postLink').value;
            if(!content) return;

            const posts = JSON.parse(localStorage.getItem('orangeVaultPosts') || '[]');
            posts.unshift({
                category: currentCategory === '전체' ? '기타' : currentCategory,
                content, link, date: new Date().toLocaleString()
            });
            localStorage.setItem('orangeVaultPosts', JSON.stringify(posts));
            document.getElementById('postContent').value = '';
            document.getElementById('postLink').value = '';
            renderPosts();
        }

        function deletePost(index) {
            if(confirm("기록을 삭제하시겠습니까?")) {
                const posts = JSON.parse(localStorage.getItem('orangeVaultPosts') || '[]');
                posts.splice(index, 1);
                localStorage.setItem('orangeVaultPosts', JSON.stringify(posts));
                renderPosts();
            }
        }

        function renderPosts() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            const posts = JSON.parse(localStorage.getItem('orangeVaultPosts') || '[]');
            posts.forEach((p, index) => {
                if(currentCategory !== '전체' && p.category !== currentCategory) return;
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-header">
                        <span class="post-category">${p.category}</span>
                        <button class="control-btn" onclick="deletePost(${index})">삭제</button>
                    </div>
                    <div class="post-content">${p.content}</div>
                    ${p.link ? `<a href="${p.link}" target="_blank" class="post-link">📍 관련 자료 확인</a>` : ''}
                    <div class="post-date">${p.date}</div>`;
                board.appendChild(card);
            });
        }
        renderPosts();
    </script>
</body>
</html>
