<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Vault</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --silver-bg: #f5f5f7;
            --silver-gradient: linear-gradient(145deg, #e6e6e6, #ffffff);
            --accent-silver: #8e8e93;
            --text-main: #1d1d1f;
            --glass-effect: rgba(255, 255, 255, 0.7);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--silver-bg); 
            color: var(--text-main);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 큰 메뉴 섹션 */
        nav {
            width: 100%; background: var(--glass-effect);
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid #d1d1d6; padding: 10px 0;
            display: flex; justify-content: center; gap: 15px; overflow-x: auto;
        }
        nav button {
            background: none; border: none; font-size: 0.9em; font-weight: 600;
            color: var(--accent-silver); cursor: pointer; white-space: nowrap;
            padding: 5px 10px; transition: 0.3s;
        }
        nav button.active { color: var(--text-main); border-bottom: 2px solid var(--text-main); }

        .container { width: 90%; max-width: 600px; margin-top: 20px; }

        /* 입력창 스타일 */
        .editor-card {
            background: var(--silver-gradient); border-radius: 15px;
            padding: 20px; box-shadow: 5px 5px 15px #d1d1d6, -5px -5px 15px #ffffff;
            margin-bottom: 30px;
        }
        input, textarea {
            width: 100%; border: 1px solid #d1d1d6; border-radius: 8px;
            background: rgba(255,255,255,0.5); padding: 12px; margin-bottom: 10px;
            box-sizing: border-box; font-size: 1em;
        }
        textarea { height: 150px; resize: none; }
        
        .btn-group { display: flex; gap: 10px; }
        button.main-btn {
            flex: 1; padding: 12px; border: none; border-radius: 8px;
            background: var(--text-main); color: white; font-weight: bold; cursor: pointer;
        }

        /* 게시판 스타일 */
        .post-card {
            background: white; border-radius: 12px; padding: 15px;
            margin-bottom: 15px; border: 1px solid #e5e5ea;
        }
        .post-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .post-category { font-size: 0.75em; color: var(--accent-silver); font-weight: bold; text-transform: uppercase; }
        .post-controls { display: flex; gap: 8px; }
        .control-btn { font-size: 0.75em; background: none; border: 1px solid #d1d1d6; border-radius: 4px; padding: 2px 6px; cursor: pointer; color: #666; }
        
        .post-content { line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
        .post-link { display: block; margin-top: 10px; font-size: 0.85em; color: #007aff; text-decoration: none; }
        .post-date { font-size: 0.7em; color: #aeaeb2; margin-top: 10px; }
    </style>
</head>
<body>

    <nav id="menuNav">
        <button onclick="setCategory('의학')" id="menu-의학">의학</button>
        <button onclick="setCategory('시사')" id="menu-시사">시사</button>
        <button onclick="setCategory('과학')" id="menu-과학">과학</button>
        <button onclick="setCategory('인물')" id="menu-인물">인물</button>
        <button onclick="setCategory('New Fields')" id="menu-New Fields">New Fields</button>
        <button onclick="setCategory('전체')" id="menu-전체" class="active">전체</button>
    </nav>

    <div class="container">
        <div class="editor-card">
            <input type="text" id="postLink" placeholder="사진 또는 관련 링크 (선택사항)">
            <textarea id="postContent" placeholder="긴 글도 마음껏 기록하세요..."></textarea>
            <div class="btn-group">
                <button class="main-btn" onclick="savePost()">기록하기</button>
            </div>
        </div>

        <div id="board"></div>
    </div>

    <script>
        let currentCategory = '전체';
        let editIndex = -1;

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(`menu-${cat}`).classList.add('active');
            renderPosts();
        }

        function savePost() {
            const content = document.getElementById('postContent').value;
            const link = document.getElementById('postLink').value;
            if(!content) return;

            const posts = JSON.parse(localStorage.getItem('vaultPosts') || '[]');
            
            const newPost = {
                category: currentCategory === '전체' ? '기타' : currentCategory,
                content: content,
                link: link,
                date: new Date().toLocaleString()
            };

            if(editIndex > -1) {
                posts[editIndex] = newPost;
                editIndex = -1;
            } else {
                posts.unshift(newPost);
            }

            localStorage.setItem('vaultPosts', JSON.stringify(posts));
            document.getElementById('postContent').value = '';
            document.getElementById('postLink').value = '';
            renderPosts();
        }

        function deletePost(index) {
            if(confirm("정말 삭제할까요?")) {
                const posts = JSON.parse(localStorage.getItem('vaultPosts') || '[]');
                posts.splice(index, 1);
                localStorage.setItem('vaultPosts', JSON.stringify(posts));
                renderPosts();
            }
        }

        function editPost(index) {
            const posts = JSON.parse(localStorage.getItem('vaultPosts') || '[]');
            const post = posts[index];
            document.getElementById('postContent').value = post.content;
            document.getElementById('postLink').value = post.link;
            editIndex = index;
            window.scrollTo(0,0);
        }

        function renderPosts() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            const posts = JSON.parse(localStorage.getItem('vaultPosts') || '[]');
            
            posts.forEach((p, index) => {
                if(currentCategory !== '전체' && p.category !== currentCategory) return;

                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-header">
                        <span class="post-category">${p.category}</span>
                        <div class="post-controls">
                            <button class="control-btn" onclick="editPost(${index})">수정</button>
                            <button class="control-btn" onclick="deletePost(${index})">삭제</button>
                        </div>
                    </div>
                    <div class="post-content">${p.content}</div>
                    ${p.link ? `<a href="${p.link}" target="_blank" class="post-link">🔗 관련 링크/사진 보기</a>` : ''}
                    <div class="post-date">${p.date}</div>
                `;
                board.appendChild(card);
            });
        }

        renderPosts();
    </script>
</body>
</html>
