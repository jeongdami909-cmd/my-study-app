<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Vault Master</title>
    <style>
        :root {
            --bg-sand: #f8f6f4;
            --point-orange: #e67e22;
            --text-dark: #2c3e50;
            --glass: rgba(255, 255, 255, 0.8);
        }

        body { background-color: var(--bg-sand); font-family: sans-serif; margin: 0; color: var(--text-dark); }

        /* 1. 상단 배경 사진 영역 (사용자가 직접 업로드/변경 가능) */
        .top-hero {
            width: 100%; height: 250px; background-color: #ddd;
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        .hero-overlay {
            position: absolute; bottom: 10px; right: 10px;
            background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px;
            color: white; font-size: 0.7rem; cursor: pointer;
        }

        /* 2. 검색 및 네비게이션 */
        .search-area { width: 90%; max-width: 600px; margin: -30px auto 20px; z-index: 10; position: relative; }
        .google-search { display: flex; background: white; border-radius: 50px; padding: 10px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .google-search input { flex: 1; border: none; outline: none; font-size: 1rem; }

        nav { display: flex; justify-content: center; gap: 8px; padding: 15px; overflow-x: auto; }
        nav button { background: white; border: 1px solid #eee; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; transition: 0.3s; }
        nav button.active { background: var(--point-orange); color: white; border-color: var(--point-orange); }

        .container { width: 92%; max-width: 650px; margin: 0 auto; padding-bottom: 50px; }

        /* 3. 기록 입력란 */
        .editor-card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .editor-card input, .editor-card textarea { width: 100%; border: 1px solid #f0f0f0; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-sizing: border-box; background: #fafafa; font-size: 1rem; }
        .file-box { border: 2px dashed #ddd; padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 15px; cursor: pointer; color: var(--point-orange); font-weight: bold; }

        .main-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; background: var(--point-orange); color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem; }

        /* 4. 게시판 리스트 (사진 작게, 글 크게) */
        .post-card { background: white; border-radius: 20px; margin-bottom: 20px; padding: 20px; display: flex; gap: 20px; position: relative; border: 1px solid #eee; transition: 0.3s; }
        .post-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }

        /* 작은 사진 링크 (썸네일) */
        .post-thumb { width: 100px; height: 100px; border-radius: 12px; object-fit: cover; background: #f0f0f0; flex-shrink: 0; cursor: pointer; }

        /* 큰 글 게시판 내용 */
        .post-content-area { flex: 1; }
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .post-category { font-size: 0.75rem; font-weight: bold; color: var(--point-orange); text-transform: uppercase; }
        .post-title { font-size: 1.25rem; font-weight: bold; margin-bottom: 10px; color: #222; }
        .post-text { line-height: 1.7; font-size: 0.95rem; color: #555; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .post-date { font-size: 0.75rem; color: #bbb; margin-top: 10px; }

        /* 수정/삭제 버튼 (게시판 상단 배치) */
        .post-actions { position: absolute; top: 15px; right: 20px; display: flex; gap: 8px; }
        .action-btn { background: #f8f8f8; border: 1px solid #eee; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; color: #888; }
        .action-btn:hover { background: var(--point-orange); color: white; }
    </style>
</head>
<body>

    <div class="top-hero" id="topHero" style="background-image: url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1200&q=80');">
        <label class="hero-overlay">
            📷 배경 사진 변경
            <input type="file" id="heroInput" hidden accept="image/*">
        </label>
        <h1 style="color:white; text-shadow: 0 2px 10px rgba(0,0,0,0.3); letter-spacing: 5px;">VAULT</h1>
    </div>

    <div class="search-area">
        <div class="google-search">
            <form action="https://www.google.com/search" method="GET" target="_blank" style="width:100%; display:flex;">
                <input type="text" name="q" placeholder="구글 지식 검색 시작...">
                <button type="submit" style="background:none; border:none; cursor:pointer; font-size:1.2rem;">🔍</button>
            </form>
        </div>
    </div>

    <nav>
        <button onclick="setCategory('의학')" id="menu-의학">의학</button>
        <button onclick="setCategory('시사')" id="menu-시사">시사</button>
        <button onclick="setCategory('과학')" id="menu-과학">과학</button>
        <button onclick="setCategory('인물')" id="menu-인물">인물</button>
        <button onclick="setCategory('New Fields')" id="menu-New Fields">New Fields</button>
        <button onclick="setCategory('전체')" id="menu-전체" class="active">전체</button>
    </nav>

    <div class="container">
        <div class="editor-card">
            <input type="text" id="postTitle" placeholder="오늘의 핵심 제목">
            <div class="file-box" onclick="document.getElementById('postFileInput').click()">
                🖼️ 참고 사진 첨부 (작게 표시됨)
            </div>
            <input type="file" id="postFileInput" hidden accept="image/*">
            <textarea id="postContent" placeholder="긴 글 내용을 마음껏 기록하세요..." rows="6"></textarea>
            <button class="main-btn" onclick="savePost()">지식 창고에 저장하기</button>
        </div>

        <div id="board"></div>
    </div>

    <script>
        let currentCategory = '전체';
        let selectedPostImg = "";
        let editIndex = -1;

        // 상단 배경 변경
        document.getElementById('heroInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    document.getElementById('topHero').style.backgroundImage = `url(${ev.target.result})`;
                    localStorage.setItem('heroImg', ev.target.result);
                };
                reader.readAsDataURL(file);
            }
        });

        // 게시글 사진 첨부
        document.getElementById('postFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => { selectedPostImg = ev.target.result; alert("사진이 준비되었습니다."); };
                reader.readAsDataURL(file);
            }
        });

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(`menu-${cat}`).classList.add('active');
            renderPosts();
        }

        function savePost() {
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            if(!title || !content) return;

            const posts = JSON.parse(localStorage.getItem('vaultFinalV5') || '[]');
            const data = { category: currentCategory, title, content, img: selectedPostImg, date: new Date().toLocaleDateString() };

            if(editIndex > -1) { posts[editIndex] = data; editIndex = -1; }
            else { posts.unshift(data); }

            localStorage.setItem('vaultFinalV5', JSON.stringify(posts));
            resetForm();
            renderPosts();
        }

        function resetForm() {
            document.getElementById('postTitle').value = '';
            document.getElementById('postContent').value = '';
            selectedPostImg = "";
        }

        function deletePost(index) {
            if(confirm("기록을 삭제하시겠습니까?")) {
                const posts = JSON.parse(localStorage.getItem('vaultFinalV5') || '[]');
                posts.splice(index, 1);
                localStorage.setItem('vaultFinalV5', JSON.stringify(posts));
                renderPosts();
            }
        }

        function editPost(index) {
            const posts = JSON.parse(localStorage.getItem('vaultFinalV5') || '[]');
            const p = posts[index];
            document.getElementById('postTitle').value = p.title;
            document.getElementById('postContent').value = p.content;
            selectedPostImg = p.img;
            editIndex = index;
            window.scrollTo({top: 400, behavior: 'smooth'});
        }

        function renderPosts() {
            const board = document.getElementById('board'); board.innerHTML = '';
            const posts = JSON.parse(localStorage.getItem('vaultFinalV5') || '[]');
            
            posts.forEach((p, index) => {
                if(currentCategory !== '전체' && p.category !== currentCategory) return;
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-actions">
                        <button class="action-btn" onclick="editPost(${index})">수정</button>
                        <button class="action-btn" onclick="deletePost(${index})">삭제</button>
                    </div>
                    ${p.img ? `<img src="${p.img}" class="post-thumb" onclick="window.open(this.src)">` : `<div class="post-thumb" style="display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:#ccc;border:1px solid #eee;">NO IMG</div>`}
                    <div class="post-content-area">
                        <div class="post-header"><span class="post-category">#${p.category}</span></div>
                        <div class="post-title">${p.title}</div>
                        <div class="post-text">${p.content}</div>
                        <div class="post-date">${p.date}</div>
                    </div>
                `;
                board.appendChild(card);
            });
        }
        
        // 배경사진 복구
        const savedHero = localStorage.getItem('heroImg');
        if(savedHero) document.getElementById('topHero').style.backgroundImage = `url(${savedHero})`;
        renderPosts();
    </script>
</body>
</html>
