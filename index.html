<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Knowledge Vault</title>
    <style>
        :root {
            --bg-color: #f4f2f0;
            --point-color: #c36839;
            --point-hover: #a6552c;
            --text-main: #2b2b2b;
            --text-sub: #7a7a7a;
            --card-bg: #ffffff;
            
            /* 💡 뷰어 설정을 위한 동적 변수 (기본값) */
            --post-font-size: 1.05rem;
            --post-line-height: 1.75;
            --post-padding-x: 25px;
            --post-padding-y: 25px;
        }

        body { 
            background-color: var(--bg-color); font-family: 'Pretendard', -apple-system, sans-serif; 
            margin: 0; color: var(--text-main); -webkit-font-smoothing: antialiased;
        }

        .top-hero {
            width: 100%; height: 220px; background-color: #ddd;
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .hero-overlay {
            position: absolute; bottom: 12px; right: 15px;
            background: rgba(0,0,0,0.6); padding: 6px 12px; border-radius: 6px;
            color: white; font-size: 0.75rem; cursor: pointer; letter-spacing: 0.5px;
            backdrop-filter: blur(4px); transition: 0.2s;
        }
        
        .search-area { 
            width: 92%; max-width: 600px; margin: -25px auto 15px; position: relative; z-index: 10; 
            display: flex; flex-direction: column; gap: 10px; align-items: center;
        }
        .google-search { 
            width: 100%; display: flex; background: var(--card-bg); border-radius: 12px; 
            padding: 8px 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); border: 1px solid #ebebeb;
        }
        .google-search input { flex: 1; border: none; outline: none; font-size: 0.95rem; color: var(--text-main); background: transparent; }
        .google-search button { background: none; border: none; font-size: 1.1rem; cursor: pointer; margin-right: 8px; color: #aaa; padding: 0; }
        
        .local-search { 
            width: 75%; max-width: 450px; display: flex; align-items: center; 
            background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(195, 104, 57, 0.3); 
            padding: 8px 18px; border-radius: 25px; backdrop-filter: blur(5px); transition: 0.3s; 
        }
        .local-search:focus-within { border-color: var(--point-color); box-shadow: 0 4px 12px rgba(195, 104, 57, 0.15); background: #fff; }
        .local-search input { flex: 1; border: none; outline: none; background: transparent; font-family: inherit; font-size: 0.9rem; color: var(--text-main); }
        .local-search input::placeholder { color: #aaa; }
        .local-search .icon-left { color: var(--point-color); margin-right: 8px; font-size: 1rem; }
        
        .local-search-btn {
            background: none; border: none; cursor: pointer; font-size: 1.1rem;
            margin-left: 5px; padding: 0; transition: transform 0.2s;
        }
        .local-search-btn:hover { transform: scale(1.15); }

        nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 10px 15px 20px; max-width: 600px; margin: 0 auto; }
        nav button { 
            background: var(--card-bg); border: 1px solid #e0e0e0; padding: 8px 16px; 
            border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 500; 
            color: var(--text-sub); transition: 0.2s; 
        }
        nav button.active { background: var(--point-color); color: white; border-color: var(--point-color); }

        .container { width: 92%; max-width: 650px; margin: 0 auto; padding-bottom: 80px; }

        .editor-card { 
            background: var(--card-bg); border-radius: 16px; padding: 25px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 35px; border: 1px solid #eaeaea;
        }
        .editor-header { margin-top: 0; margin-bottom: 20px; font-size: 1.1rem; color: var(--text-main); font-weight: 700; }
        
        .input-row { display: flex; gap: 10px; margin-bottom: 12px; width: 100%; box-sizing: border-box; }
        .input-row input { flex: 7; margin-bottom: 0; min-width: 0; }
        .input-row select { flex: 3; margin-bottom: 0; min-width: 0; padding-left: 10px; padding-right: 10px; cursor: pointer; background-color: #fcfcfc; }
        
        .editor-card input, .editor-card select { 
            border: 1px solid #e2e2e2; border-radius: 8px; padding: 14px; 
            box-sizing: border-box; font-size: 0.95rem; outline: none; transition: 0.2s;
        }
        
        .editor-card textarea {
            width: 100%; border: 1px solid #e2e2e2; border-radius: 8px; padding: 15px; 
            box-sizing: border-box; font-size: 1rem; outline: none; transition: 0.2s;
            min-height: 150px; resize: none; overflow-y: hidden; line-height: 1.6;
            font-family: inherit;
        }
        
        .editor-card input:focus, .editor-card textarea:focus, .editor-card select:focus { border-color: var(--point-color); background: #fff; }
        
        .file-box { border: 1px dashed #d0d0d0; padding: 16px; text-align: center; border-radius: 8px; margin-bottom: 12px; cursor: pointer; color: var(--text-sub); font-size: 0.9rem; background: #fafafa; transition: 0.2s; }
        .file-box:hover { border-color: var(--point-color); color: var(--point-color); background: #fffaf7; }

        .main-btn { width: 100%; padding: 16px; border: none; border-radius: 8px; background: var(--point-color); color: white; font-weight: 600; cursor: pointer; font-size: 1.05rem; }

        #board { scroll-margin-top: 20px; }
        
        .no-results {
            text-align: center; padding: 40px 20px; background: var(--card-bg); 
            border: 1px dashed var(--point-color); color: var(--text-sub); 
            border-radius: 12px; font-size: 1.05rem;
        }

        .post-card { 
            background: var(--card-bg); border-radius: 16px; margin-bottom: 25px; 
            display: flex; flex-direction: column; position: relative; 
            border: 1px solid #eaeaea; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        
        .post-img-container {
            width: 100%; max-height: 280px; overflow: hidden; background: #f9f9f9;
            display: flex; justify-content: center; align-items: center; border-bottom: 1px solid #f0f0f0;
        }
        .post-thumb { 
            width: 100%; height: auto; object-fit: contain; cursor: zoom-in; 
            max-height: 280px;
        }

        /* 💡 뷰어 변수를 통해 여백(Padding)이 동적으로 조절됨 */
        .post-content-area { 
            padding: var(--post-padding-y) var(--post-padding-x); 
            display: flex; flex-direction: column; cursor: pointer; 
        }
        
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        .category-group { display: flex; align-items: center; gap: 10px; }
        .post-category { font-size: 0.8rem; font-weight: 700; color: var(--point-color); letter-spacing: 0.5px; }
        
        .tts-btn { 
            background: #fff0e6; border: 1px solid var(--point-color); 
            color: var(--point-hover); padding: 4px 10px; border-radius: 20px; 
            font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .tts-btn:hover { background: var(--point-color); color: white; }

        /* 💡 뷰어 변수를 통해 제목 크기도 비율에 맞게 동적 조절 */
        .post-title { 
            font-size: calc(var(--post-font-size) + 0.35rem); 
            font-weight: 700; margin-bottom: 12px; color: var(--text-main); 
            line-height: 1.4; word-break: keep-all; 
        }
        
        /* 💡 뷰어 변수를 통해 본문 글자 크기와 줄 간격이 조절됨 */
        .post-text { 
            line-height: var(--post-line-height); 
            font-size: var(--post-font-size); 
            color: #444; display: -webkit-box; -webkit-line-clamp: 3; 
            -webkit-box-orient: vertical; overflow: hidden; white-space: pre-wrap; 
            flex-grow: 1; transition: all 0.3s ease; 
        }
        .post-text.expanded { display: block; -webkit-line-clamp: unset; }
        
        .expand-hint { font-size: 0.85rem; color: var(--point-color); font-weight: 700; margin-top: 12px; text-align: center; }
        .post-date { font-size: 0.8rem; color: #aaa; margin-top: 15px; text-align: right; }

        .post-actions { position: absolute; top: 15px; right: 15px; display: flex; gap: 8px; z-index: 5; }
        .action-btn { background: rgba(255,255,255,0.85); backdrop-filter: blur(4px); border: 1px solid #ddd; padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; color: #444; font-weight: 600; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .action-btn:hover { background: white; color: var(--point-color); border-color: var(--point-color); }

        .highlight { background-color: #ffebd2; color: var(--point-hover); padding: 0 4px; border-radius: 3px; font-weight: bold; transition: 0.3s; }

        /* 💡 뷰어 설정 플로팅 버튼 및 모달 스타일 */
        .fab-viewer {
            position: fixed; bottom: 30px; right: 30px; width: 55px; height: 55px;
            background: var(--card-bg); color: var(--text-main); border: 1px solid #ddd;
            border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 100; transition: 0.2s; font-family: serif;
        }
        .fab-viewer:hover { transform: scale(1.05); border-color: var(--point-color); color: var(--point-color); }

        .viewer-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
        .viewer-modal-overlay.open { display: flex; }
        .viewer-modal-content { background: white; width: 100%; max-width: 400px; padding: 35px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); position: relative; }
        .v-close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: #aaa; background: none; border: none; }
        
        .setting-group { margin-bottom: 25px; }
        .setting-group label { display: flex; justify-content: space-between; font-size: 0.95rem; font-weight: 600; color: #444; margin-bottom: 12px; }
        /* 슬라이더 바 스타일 */
        .setting-group input[type="range"] { width: 100%; accent-color: var(--point-color); cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-hero" id="topHero" style="background-image: url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1200&q=80');">
        <label class="hero-overlay">
            📷 커버 변경
            <input type="file" id="heroInput" hidden accept="image/*">
        </label>
        <h1 style="color:white; font-size:2rem; font-weight:300; letter-spacing:8px; text-shadow: 0 4px 15px rgba(0,0,0,0.4);">VAULT</h1>
    </div>

    <div class="search-area">
        <form action="https://www.google.com/search" method="GET" target="_blank" class="google-search" onsubmit="return true;">
            <button type="submit">🔍</button>
            <input type="search" name="q" placeholder="구글 지식 검색..." required>
        </form>
        
        <form class="local-search" onsubmit="event.preventDefault(); executeSearch();">
            <span class="icon-left">⚲</span>
            <input type="search" id="localSearchInput" placeholder="내 기록 안에서 검색 (입력 후 엔터)">
            <button type="submit" class="local-search-btn">🔍</button>
        </form>
    </div>

    <nav>
        <button onclick="setFilter('의학')" id="menu-의학">의학</button>
        <button onclick="setFilter('시사')" id="menu-시사">시사</button>
        <button onclick="setFilter('과학')" id="menu-과학">과학</button>
        <button onclick="setFilter('인물')" id="menu-인물">인물</button>
        <button onclick="setFilter('New Fields')" id="menu-New Fields">New Fields</button>
        <button onclick="setFilter('전체')" id="menu-전체" class="active">전체</button>
    </nav>

    <div class="container">
        <div class="editor-card">
            <div class="editor-header">지식 기록하기</div>
            
            <div class="input-row">
                <input type="text" id="postTitle" placeholder="제목">
                <select id="postCategory">
                    <option value="의학">의학</option>
                    <option value="시사">시사</option>
                    <option value="과학">과학</option>
                    <option value="인물">인물</option>
                    <option value="New Fields">New Fields</option>
                </select>
            </div>

            <div class="file-box" onclick="document.getElementById('postFileInput').click()" id="fileBoxText">
                + 관련 사진 첨부
            </div>
            <input type="file" id="postFileInput" hidden accept="image/*">
            
            <textarea id="postContent" placeholder="여기에 내용을 기록하세요. 긴 글을 쓰면 칸이 아래로 자동으로 늘어납니다..." oninput="autoResize(this)"></textarea>
            
            <button class="main-btn" onclick="savePost()">저장하기</button>
        </div>

        <div id="board"></div>
    </div>

    <button class="fab-viewer" onclick="openViewerModal()" title="뷰어 설정">Aa</button>

    <div class="viewer-modal-overlay" id="viewerModal">
        <div class="viewer-modal-content">
            <button class="v-close-btn" onclick="closeViewerModal()">×</button>
            <h3 style="margin-top:0; margin-bottom: 25px; font-size:1.3rem; color: var(--point-color);">뷰어 설정</h3>
            
            <div class="setting-group">
                <label><span>글자 크기</span> <span id="v-val-fontSize"></span></label>
                <input type="range" id="v-fontSize" min="0.8" max="1.6" step="0.05" oninput="updateViewerSettings()">
            </div>
            <div class="setting-group">
                <label><span>문단 간격</span> <span id="v-val-lineHeight"></span></label>
                <input type="range" id="v-lineHeight" min="1.3" max="2.5" step="0.1" oninput="updateViewerSettings()">
            </div>
            <div class="setting-group">
                <label><span>좌우 여백</span> <span id="v-val-paddingX"></span></label>
                <input type="range" id="v-paddingX" min="10" max="45" step="1" oninput="updateViewerSettings()">
            </div>
            <div class="setting-group">
                <label><span>상하 여백</span> <span id="v-val-paddingY"></span></label>
                <input type="range" id="v-paddingY" min="15" max="50" step="1" oninput="updateViewerSettings()">
            </div>
            
            <button class="action-btn" style="width:100%; margin-top:10px; padding:12px; font-size:1rem; background:#f4f4f4;" onclick="resetViewerSettings()">기본값으로 초기화</button>
        </div>
    </div>

    <script>
        // 💡 뷰어 설정 관리 로직
        const defaultViewer = { fontSize: 1.05, lineHeight: 1.75, paddingX: 25, paddingY: 25 };
        let viewerSettings = JSON.parse(localStorage.getItem('vaultViewerSettings')) || defaultViewer;

        function applyViewerSettings() {
            // CSS 변수를 실시간으로 업데이트하여 전체 카드의 모양을 바꿉니다.
            document.documentElement.style.setProperty('--post-font-size', viewerSettings.fontSize + 'rem');
            document.documentElement.style.setProperty('--post-line-height', viewerSettings.lineHeight);
            document.documentElement.style.setProperty('--post-padding-x', viewerSettings.paddingX + 'px');
            document.documentElement.style.setProperty('--post-padding-y', viewerSettings.paddingY + 'px');
            
            // 모달 안의 슬라이더 값 동기화
            document.getElementById('v-fontSize').value = viewerSettings.fontSize;
            document.getElementById('v-lineHeight').value = viewerSettings.lineHeight;
            document.getElementById('v-paddingX').value = viewerSettings.paddingX;
            document.getElementById('v-paddingY').value = viewerSettings.paddingY;
        }

        function updateViewerSettings() {
            viewerSettings = {
                fontSize: document.getElementById('v-fontSize').value,
                lineHeight: document.getElementById('v-lineHeight').value,
                paddingX: document.getElementById('v-paddingX').value,
                paddingY: document.getElementById('v-paddingY').value
            };
            localStorage.setItem('vaultViewerSettings', JSON.stringify(viewerSettings));
            applyViewerSettings();
        }

        function resetViewerSettings() {
            viewerSettings = { ...defaultViewer };
            localStorage.setItem('vaultViewerSettings', JSON.stringify(viewerSettings));
            applyViewerSettings();
        }

        function openViewerModal() { document.getElementById('viewerModal').classList.add('open'); }
        function closeViewerModal() { document.getElementById('viewerModal').classList.remove('open'); }

        // 페이지 진입 시 저장된 뷰어 설정 불러오기
        applyViewerSettings();


        // === 기존 Vault 기능 ===
        let currentFilter = '전체'; 
        let selectedPostImg = "";
        let editIndex = -1;
        let currentSpeakingIndex = -1;

        function executeSearch() {
            renderPosts();
            setTimeout(() => {
                const board = document.getElementById('board');
                if(board) { board.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
            }, 100);
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        document.getElementById('heroInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    document.getElementById('topHero').style.backgroundImage = `url(${ev.target.result})`;
                    localStorage.setItem('heroImg', ev.target.result);
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('postFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => { 
                    selectedPostImg = ev.target.result; 
                    document.getElementById('fileBoxText').innerHTML = "✔️ 사진 첨부됨 (클릭 시 변경)";
                    document.getElementById('fileBoxText').style.borderColor = "var(--point-color)";
                    document.getElementById('fileBoxText').style.color = "var(--point-color)";
                };
                reader.readAsDataURL(file);
            }
        });

        function setFilter(cat) {
            currentFilter = cat;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(`menu-${cat}`).classList.add('active');
            document.getElementById('localSearchInput').value = ''; 
            
            if(window.speechSynthesis.speaking) window.speechSynthesis.cancel();
            renderPosts();
        }

        function savePost() {
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            const category = document.getElementById('postCategory').value; 
            
            if(!title || !content) { alert("제목과 내용을 입력해주세요."); return; }

            const posts = JSON.parse(localStorage.getItem('vaultFinalV7') || '[]');
            const data = { category: category, title, content, img: selectedPostImg, date: new Date().toLocaleDateString() };

            if(editIndex > -1) { posts[editIndex] = data; editIndex = -1; }
            else { posts.unshift(data); }

            localStorage.setItem('vaultFinalV7', JSON.stringify(posts));
            resetForm();
            renderPosts();
        }

        function resetForm() {
            document.getElementById('postTitle').value = '';
            const contentBox = document.getElementById('postContent');
            contentBox.value = '';
            contentBox.style.height = '150px'; 
            document.getElementById('postCategory').value = '의학'; 
            selectedPostImg = "";
            document.getElementById('fileBoxText').innerHTML = "+ 관련 사진 첨부";
            document.getElementById('fileBoxText').style.borderColor = "#d0d0d0";
            document.getElementById('fileBoxText').style.color = "var(--text-sub)";
        }

        function deletePost(event, index) {
            event.stopPropagation(); 
            if(confirm("기록을 삭제하시겠습니까?")) {
                const posts = JSON.parse(localStorage.getItem('vaultFinalV7') || '[]');
                posts.splice(index, 1);
                localStorage.setItem('vaultFinalV7', JSON.stringify(posts));
                renderPosts();
            }
        }

        function editPost(event, index) {
            event.stopPropagation(); 
            const posts = JSON.parse(localStorage.getItem('vaultFinalV7') || '[]');
            const p = posts[index];
            document.getElementById('postTitle').value = p.title;
            document.getElementById('postCategory').value = p.category; 
            
            const contentBox = document.getElementById('postContent');
            contentBox.value = p.content;
            autoResize(contentBox); 
            
            selectedPostImg = p.img || "";
            
            if(p.img) {
                document.getElementById('fileBoxText').innerHTML = "✔️ 기존 사진 유지 (클릭 시 변경)";
                document.getElementById('fileBoxText').style.color = "var(--point-color)";
                document.getElementById('fileBoxText').style.borderColor = "var(--point-color)";
            } else {
                document.getElementById('fileBoxText').innerHTML = "+ 관련 사진 첨부";
                document.getElementById('fileBoxText').style.borderColor = "#d0d0d0";
                document.getElementById('fileBoxText').style.color = "var(--text-sub)";
            }
            editIndex = index;
            window.scrollTo({top: 300, behavior: 'smooth'});
        }

        function toggleText(element) {
            const textEl = element.querySelector('.post-text');
            const hintEl = element.querySelector('.expand-hint');
            textEl.classList.toggle('expanded');
            
            if (textEl.classList.contains('expanded')) {
                hintEl.innerText = '접기 ▴';
            } else {
                hintEl.innerText = '자세히 보기 ▾';
            }
        }

        function highlightKeyword(text, keyword) {
            if (!keyword) return text;
            const regex = new RegExp(`(${keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        function toggleTTS(event, index) {
            event.stopPropagation(); 
            
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                if (currentSpeakingIndex === index) {
                    currentSpeakingIndex = -1;
                    return; 
                }
            }

            const posts = JSON.parse(localStorage.getItem('vaultFinalV7') || '[]');
            const p = posts[index];
            
            const textToRead = p.title + "....... " + p.content;
            const utterance = new SpeechSynthesisUtterance(textToRead);
            
            utterance.lang = 'ko-KR'; 
            utterance.rate = 0.95; 
            
            utterance.onend = function() {
                currentSpeakingIndex = -1;
            };

            window.speechSynthesis.speak(utterance);
            currentSpeakingIndex = index;
        }

        function renderPosts() {
            const board = document.getElementById('board'); 
            board.innerHTML = '';
            const posts = JSON.parse(localStorage.getItem('vaultFinalV7') || '[]');
            
            const searchInput = document.getElementById('localSearchInput');
            const searchQuery = searchInput ? searchInput.value.toLowerCase().trim() : '';
            let matchCount = 0; 
            
            posts.forEach((p, index) => {
                if(currentFilter !== '전체' && p.category !== currentFilter) return;
                
                if(searchQuery) {
                    const titleMatch = p.title.toLowerCase().includes(searchQuery);
                    const contentMatch = p.content.toLowerCase().includes(searchQuery);
                    if(!titleMatch && !contentMatch) return;
                }
                
                matchCount++;
                
                const displayTitle = highlightKeyword(p.title, searchQuery);
                const displayContent = highlightKeyword(p.content, searchQuery);
                
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-actions">
                        <button class="action-btn" onclick="editPost(event, ${index})">수정</button>
                        <button class="action-btn" onclick="deletePost(event, ${index})">삭제</button>
                    </div>
                    
                    ${p.img ? `<div class="post-img-container"><img src="${p.img}" class="post-thumb" onclick="window.open(this.src)"></div>` : ''}
                    
                    <div class="post-content-area" onclick="toggleText(this)">
                        <div class="post-header">
                            <div class="category-group">
                                <span class="post-category">${p.category}</span>
                                <button class="tts-btn" onclick="toggleTTS(event, ${index})" title="음성으로 듣기">🔊 듣기</button>
                            </div>
                        </div>
                        <div class="post-title">${displayTitle}</div>
                        <div class="post-text">${displayContent}</div>
                        <div class="expand-hint">자세히 보기 ▾</div>
                        <div class="post-date">${p.date}</div>
                    </div>
                `;
                board.appendChild(card);
            });

            if (searchQuery && matchCount === 0) {
                board.innerHTML = `<div class="no-results">"${searchQuery}"에 대한 지식 기록을 찾을 수 없습니다.</div>`;
            }
        }
        
        const savedHero = localStorage.getItem('heroImg');
        if(savedHero) document.getElementById('topHero').style.backgroundImage = `url(${savedHero})`;
        renderPosts();
    </script>
</body>
</html>
