<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Vault v4</title>
    <style>
        :root {
            --bg-sand: #fdfaf8;
            --point-orange: #e67e22;
            --text-dark: #2c3e50;
        }

        body { background-color: var(--bg-sand); font-family: sans-serif; margin: 0; color: var(--text-dark); }

        /* 상단 헤더 & 구글 검색 */
        .hero { background: #eee; height: 120px; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .google-search { width: 90%; max-width: 500px; margin: -20px auto 20px; display: flex; background: white; border-radius: 50px; padding: 5px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .google-search input { flex: 1; border: none; padding: 10px; outline: none; }

        .container { width: 92%; max-width: 500px; margin: 0 auto; padding-bottom: 50px; }

        nav { display: flex; justify-content: center; gap: 8px; padding: 15px; overflow-x: auto; }
        nav button { background: white; border: 1px solid #ddd; padding: 6px 12px; border-radius: 20px; cursor: pointer; white-space: nowrap; }
        nav button.active { background: var(--point-orange); color: white; border-color: var(--point-orange); }

        /* 입력 카드 */
        .editor-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .editor-card input, .editor-card textarea { width: 100%; border: 1px solid #eee; border-radius: 8px; padding: 12px; margin-bottom: 10px; box-sizing: border-box; }
        
        /* 사진 선택 칸 */
        .file-label { display: block; background: #fdf2eb; border: 1px dashed var(--point-orange); padding: 15px; text-align: center; border-radius: 8px; margin-bottom: 10px; cursor: pointer; color: var(--point-orange); font-weight: bold; }
        #fileInput { display: none; }

        .main-btn { width: 100%; padding: 15px; border: none; border-radius: 8px; background: var(--point-orange); color: white; font-weight: bold; cursor: pointer; }

        /* 게시글 디자인 */
        .post-card { background: white; border-radius: 15px; margin-top: 25px; overflow: hidden; border: 1px solid #eee; position: relative; }
        
        /* 사진이 게시판 바로 위에 위치 */
        .post-img { width: 100%; height: 250px; object-fit: cover; background: #f9f9f9; display: block; }
        
        .post-body { padding: 20px; }
        
        /* 사진과 게시판 위 컨트롤 영역 */
        .post-controls { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; z-index: 5; }
        .btn-sm { background: rgba(0,0,0,0.5); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.75rem; backdrop-filter: blur(5px); }
        .btn-sm:hover { background: var(--point-orange); }

        .post-header { font-size: 0.8rem; color: #888; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .post-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; color: #333; }
        .post-content { line-height: 1.6; font-size: 0.95rem; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div class="hero">
        <h2 style="color:var(--point-orange); letter-spacing:2px;">KNOWLEDGE VAULT</h2>
    </div>

    <div class="google-search">
        <form action="https://www.google.com/search" method="GET" target="_blank" style="width:100%; display:flex;">
            <input type="text" name="q" placeholder="구글 지식 검색...">
            <button type="submit" style="background:none; border:none; cursor:pointer;">🔍</button>
        </form>
    </div>

    <nav id="menuNav">
        <button onclick="setCategory('의학')" id="menu-의학">의학</button>
        <button onclick="setCategory('시사')" id="menu-시사">시사</button>
        <button onclick="setCategory('과학')" id="menu-과학">과학</button>
        <button onclick="setCategory('인물')" id="menu-인물">인물</button>
        <button onclick="setCategory('New Fields')" id="menu-New Fields">New Fields</button>
        <button onclick="setCategory('전체')" id="menu-전체" class="active">전체</button>
    </nav>

    <div class="container">
        <div class="editor-card">
            <input type="text" id="postTitle" placeholder="제목을 입력하세요">
            <label class="file-label" for="fileInput">📸 사진 업로드 하기</label>
            <input type="file" id="fileInput" accept="image/*">
            <textarea id="postContent" placeholder="기록하고 싶은 내용을 작성하세요..." rows="4"></textarea>
            <button class="main-btn" onclick="savePost()">기록 저장하기</button>
        </div>
        <div id="board"></div>
    </div>

    <script>
        let currentCategory = '전체';
        let selectedImgData = "";
        let editIndex = -1;

        // 이미지 파일 읽기
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    selectedImgData = event.target.result;
                    document.querySelector('.file-label').innerText = "✅ 사진 선택됨";
                };
                reader.readAsDataURL(file);
            }
        });

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(`menu-${cat}`).classList.add('active');
            renderPosts();
        }

        function savePost() {
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            if(!title || !content) return;

            const posts = JSON.parse(localStorage.getItem('vaultV4') || '[]');
            const postData = { category: currentCategory, title, content, img: selectedImgData, date: new Date().toLocaleDateString() };

            if(editIndex > -1) { posts[editIndex] = postData; editIndex = -1; } 
            else { posts.unshift(postData); }

            localStorage.setItem('vaultV4', JSON.stringify(posts));
            resetForm();
            renderPosts();
        }

        function resetForm() {
            document.getElementById('postTitle').value = '';
            document.getElementById('postContent').value = '';
            document.getElementById('fileInput').value = '';
            selectedImgData = "";
            document.querySelector('.file-label').innerText = "📸 사진 업로드 하기";
        }

        function deletePost(index) {
            const posts = JSON.parse(localStorage.getItem('vaultV4') || '[]');
            posts.splice(index, 1);
            localStorage.setItem('vaultV4', JSON.stringify(posts));
            renderPosts();
        }

        function editPost(index) {
            const posts = JSON.parse(localStorage.getItem('vaultV4') || '[]');
            const p = posts[index];
            document.getElementById('postTitle').value = p.title;
            document.getElementById('postContent').value = p.content;
            selectedImgData = p.img;
            editIndex = index;
            window.scrollTo(0,0);
            document.querySelector('.file-label').innerText = "🔄 사진 수정 가능";
        }

        function renderPosts() {
            const board = document.getElementById('board'); board.innerHTML = '';
            const posts = JSON.parse(localStorage.getItem('vaultV4') || '[]');
            posts.forEach((p, index) => {
                if(currentCategory !== '전체' && p.category !== currentCategory) return;
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-controls">
                        <button class="btn-sm" onclick="editPost(${index})">수정</button>
                        <button class="btn-sm" onclick="deletePost(${index})">삭제</button>
                    </div>
                    ${p.img ? `<img src="${p.img}" class="post-img">` : ''}
                    <div class="post-body">
                        <div class="post-header"><span>${p.category}</span><span>${p.date}</span></div>
                        <div class="post-title">${p.title}</div>
                        <div class="post-content">${p.content}</div>
                    </div>`;
                board.appendChild(card);
            });
        }
        renderPosts();
    </script>
</body>
</html>
