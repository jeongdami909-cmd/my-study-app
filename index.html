<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Vault Final</title>
    <style>
        :root {
            --bg-sand: #fdfaf8;
            --point-orange: #e67e22;
            --text-dark: #2c3e50;
        }

        body { background-color: var(--bg-sand); font-family: sans-serif; margin: 0; color: var(--text-dark); }

        /* 1. 구글 검색바 */
        .google-search { width: 90%; max-width: 500px; margin: 20px auto; display: flex; background: white; border-radius: 50px; padding: 5px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .google-search input { flex: 1; border: none; padding: 10px; outline: none; font-size: 1rem; }

        .container { width: 92%; max-width: 550px; margin: 0 auto; padding-bottom: 50px; }

        nav { display: flex; justify-content: center; gap: 8px; padding: 10px; overflow-x: auto; }
        nav button { background: white; border: 1px solid #ddd; padding: 6px 12px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 0.8rem; }
        nav button.active { background: var(--point-orange); color: white; border-color: var(--point-orange); }

        /* 입력 영역 */
        .editor-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-top: 10px; }
        .editor-card input, .editor-card textarea { width: 100%; border: 1px solid #eee; border-radius: 8px; padding: 12px; margin-bottom: 10px; box-sizing: border-box; font-size: 1rem; }
        
        .file-label { display: block; background: #fff7f2; border: 2px dashed var(--point-orange); padding: 20px; text-align: center; border-radius: 8px; margin-bottom: 10px; cursor: pointer; color: var(--point-orange); font-weight: bold; }
        #fileInput { display: none; }

        .main-btn { width: 100%; padding: 15px; border: none; border-radius: 8px; background: var(--point-orange); color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem; }

        /* 게시글 카드 */
        .post-card { background: white; border-radius: 20px; margin-top: 30px; overflow: hidden; border: 1px solid #eee; box-shadow: 0 10px 20px rgba(0,0,0,0.05); position: relative; }
        
        /* 게시글 상단 사진 영역 */
        .post-img-container { width: 100%; height: 300px; position: relative; background: #f0f0f0; }
        .post-img { width: 100%; height: 100%; object-fit: cover; }
        
        /* 사진 위 수정/삭제 버튼 - 아주 잘 보이게 함 */
        .post-controls { position: absolute; top: 15px; right: 15px; display: flex; gap: 10px; z-index: 10; }
        .btn-ctrl { background: rgba(0,0,0,0.7); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: bold; transition: 0.2s; }
        .btn-ctrl:hover { background: var(--point-orange); border-color: white; }

        .post-body { padding: 25px; }
        .post-info { font-size: 0.8rem; color: var(--point-orange); margin-bottom: 8px; font-weight: bold; display: flex; justify-content: space-between; }
        .post-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 15px; color: #222; }
        .post-content { line-height: 1.8; font-size: 1rem; color: #444; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div class="google-search">
        <form action="https://www.google.com/search" method="GET" target="_blank" style="width:100%; display:flex;">
            <input type="text" name="q" placeholder="Google 지식 검색...">
            <button type="submit" style="background:none; border:none; cursor:pointer; font-size: 1.2rem;">🔍</button>
        </form>
    </div>

    <nav id="menuNav">
        <button onclick="setCategory('의학')" id="menu-의학">의학</button>
        <button onclick="setCategory('시사')" id="menu-시사">시사</button>
        <button onclick="setCategory('과학')" id="menu-과학">과학</button>
        <button onclick="setCategory('인물')" id="menu-인물">인물</button>
        <button onclick="setCategory('New Fields')" id="menu-New Fields">New Fields</button>
        <button onclick="setCategory('전체')" id="menu-전체" class="active">전체</button>
    </nav>

    <div class="container">
        <div class="editor-card">
            <h3 style="margin-top:0; color:var(--point-orange);">새 지식 기록하기</h3>
            <input type="text" id="postTitle" placeholder="제목">
            <label class="file-label" for="fileInput">📸 여기에 사진을 올려주세요</label>
            <input type="file" id="fileInput" accept="image/*">
            <textarea id="postContent" placeholder="내용을 입력하세요..." rows="5"></textarea>
            <button class="main-btn" onclick="savePost()">기록 저장하기</button>
        </div>
        <div id="board"></div>
    </div>

    <script>
        let currentCategory = '전체';
        let selectedImgData = "";
        let editIndex = -1;

        // 사진 파일 읽기
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    selectedImgData = event.target.result;
                    document.querySelector('.file-label').innerHTML = "✅ 사진 선택 완료";
                    document.querySelector('.file-label').style.background = "#e67e2222";
                };
                reader.readAsDataURL(file);
            }
        });

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(`menu-${cat}`).classList.add('active');
            renderPosts();
        }

        function savePost() {
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            if(!title || !content) { alert("제목과 내용을 입력해주세요!"); return; }

            const posts = JSON.parse(localStorage.getItem('vaultVFinal') || '[]');
            const postData = { category: currentCategory, title, content, img: selectedImgData, date: new Date().toLocaleString() };

            if(editIndex > -1) { posts[editIndex] = postData; editIndex = -1; } 
            else { posts.unshift(postData); }

            localStorage.setItem('vaultVFinal', JSON.stringify(posts));
            resetForm();
            renderPosts();
        }

        function resetForm() {
            document.getElementById('postTitle').value = '';
            document.getElementById('postContent').value = '';
            document.getElementById('fileInput').value = '';
            selectedImgData = "";
            document.querySelector('.file-label').innerHTML = "📸 여기에 사진을 올려주세요";
            document.querySelector('.file-label').style.background = "#fff7f2";
        }

        function deletePost(index) {
            if(confirm("이 소중한 기록을 삭제하시겠습니까?")) {
                const posts = JSON.parse(localStorage.getItem('vaultVFinal') || '[]');
                posts.splice(index, 1);
                localStorage.setItem('vaultVFinal', JSON.stringify(posts));
                renderPosts();
            }
        }

        function editPost(index) {
            const posts = JSON.parse(localStorage.getItem('vaultVFinal') || '[]');
            const p = posts[index];
            document.getElementById('postTitle').value = p.title;
            document.getElementById('postContent').value = p.content;
            selectedImgData = p.img;
            editIndex = index;
            window.scrollTo({top: 0, behavior: 'smooth'});
            document.querySelector('.file-label').innerHTML = p.img ? "✅ 기존 사진 있음 (클릭 시 교체)" : "📸 사진 추가하기";
        }

        function renderPosts() {
            const board = document.getElementById('board'); board.innerHTML = '';
            const posts = JSON.parse(localStorage.getItem('vaultVFinal') || '[]');
            
            posts.forEach((p, index) => {
                if(currentCategory !== '전체' && p.category !== currentCategory) return;
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-img-container">
                        ${p.img ? `<img src="${p.img}" class="post-img">` : `<div style="padding:100px; text-align:center; color:#ccc;">사진 없음</div>`}
                        <div class="post-controls">
                            <button class="btn-ctrl" onclick="editPost(${index})">수정</button>
                            <button class="btn-ctrl" onclick="deletePost(${index})">삭제</button>
                        </div>
                    </div>
                    <div class="post-body">
                        <div class="post-info"><span>#${p.category}</span><span>${p.date}</span></div>
                        <div class="post-title">${p.title}</div>
                        <div class="post-content">${p.content}</div>
                    </div>`;
                board.appendChild(card);
            });
        }
        renderPosts();
    </script>
</body>
</html>
