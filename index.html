<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Annals - Historical Records</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Serif+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-marble: #f4f1ea; 
            --card-slate: #5e686d; 
            --text-cream: #eaddcf; 
            --text-dark: #2c3032; 
            --accent-gold: #bda27e; 
        }

        body { 
            background-color: var(--bg-marble); 
            font-family: 'Noto Serif KR', serif; 
            margin: 0; color: var(--text-dark); 
            -webkit-font-smoothing: antialiased;
            padding-bottom: 80px;
        }

        /* 1. 최상단 큰 사진 영역 */
        .hero-section {
            width: 100%; height: 350px; 
            background-color: #333;
            background-image: url('https://images.unsplash.com/photo-1578301978018-3005759f48f7?auto=format&fit=crop&w=1200&q=80');
            background-size: cover; background-position: center 20%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }
        .hero-section::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: 1; }
        .hero-title {
            position: relative; z-index: 2;
            font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight: 700; 
            color: var(--text-cream); letter-spacing: 6px; text-shadow: 2px 4px 10px rgba(0,0,0,0.5);
            margin: 0;
        }
        .hero-subtitle {
            position: relative; z-index: 2;
            font-family: 'Playfair Display', serif; font-size: 1rem; font-style: italic;
            color: var(--accent-gold); letter-spacing: 2px; margin-top: 10px;
        }
        .hero-overlay-btn {
            position: absolute; bottom: 15px; right: 20px; z-index: 2;
            background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 4px;
            color: rgba(255,255,255,0.7); font-size: 0.75rem; cursor: pointer; border: 1px solid rgba(255,255,255,0.2);
        }

        /* 2. 통합 검색 컨테이너 (구글 + 내 DB) */
        .search-container {
            width: 90%; max-width: 700px; margin: -25px auto 30px; position: relative; z-index: 10;
            display: flex; flex-direction: column; gap: 10px; align-items: center;
        }
        
        /* 메인 구글 검색창 */
        .google-search {
            width: 100%; display: flex; background: var(--bg-marble); border: 1px solid var(--accent-gold);
            padding: 12px 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 30px;
        }
        .google-search input {
            flex: 1; border: none; outline: none; background: transparent; 
            font-family: 'Noto Serif KR', serif; font-size: 1rem; color: var(--text-dark);
        }
        .google-search button { background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(--accent-gold); }

        /* 새로 추가된 '내 DB 검색창' (작고 세련되게) */
        .local-search {
            width: 60%; max-width: 400px; display: flex; align-items: center;
            background: rgba(255, 255, 255, 0.6); border: 1px solid rgba(189, 162, 126, 0.5);
            padding: 6px 15px; border-radius: 20px; backdrop-filter: blur(4px);
        }
        .local-search input {
            flex: 1; border: none; outline: none; background: transparent;
            font-family: 'Noto Serif KR', serif; font-size: 0.85rem; color: #555;
        }
        .local-search input::placeholder { color: #888; }
        .local-search span { font-size: 0.8rem; color: var(--accent-gold); margin-right: 8px; }

        /* 3. 6개 대륙 메뉴 */
        nav {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; 
            max-width: 800px; margin: 0 auto 40px; padding: 0 20px;
        }
        .nav-btn {
            background: transparent; border: none; font-family: 'Noto Serif KR', serif;
            font-size: 0.95rem; font-weight: 500; color: #7a756d; cursor: pointer; 
            padding: 5px 10px; transition: 0.3s; border-bottom: 2px solid transparent;
        }
        .nav-btn:hover { color: var(--text-dark); }
        .nav-btn.active { color: var(--text-dark); border-bottom-color: var(--accent-gold); font-weight: 700; }

        .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }

        /* 입력 폼 */
        .editor-card {
            background: var(--card-slate); border-radius: 4px; padding: 30px; 
            margin-bottom: 50px; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 1px solid #717c82;
        }
        .editor-header {
            font-family: 'Playfair Display', serif; font-size: 1.5rem; 
            color: var(--accent-gold); margin-top: 0; margin-bottom: 25px; text-align: center;
        }
        .input-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .editor-card input, .editor-card select, .editor-card textarea {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(234, 221, 207, 0.2);
            padding: 15px; color: var(--text-cream); font-family: 'Noto Serif KR', serif;
            font-size: 1rem; outline: none; box-sizing: border-box; transition: 0.3s;
        }
        .editor-card select { flex: 1; cursor: pointer; }
        .editor-card select option { background: var(--card-slate); color: var(--text-cream); }
        .editor-card input[type="text"] { flex: 3; }
        .editor-card input:focus, .editor-card select:focus, .editor-card textarea:focus {
            border-color: var(--accent-gold); background: rgba(255,255,255,0.1);
        }
        .editor-card textarea { min-height: 120px; resize: none; overflow-y: hidden; line-height: 1.7; }
        .editor-card textarea::placeholder, .editor-card input::placeholder { color: rgba(234, 221, 207, 0.4); }

        .file-box {
            border: 1px dashed rgba(234, 221, 207, 0.3); padding: 15px; text-align: center; 
            margin-bottom: 15px; cursor: pointer; color: var(--accent-gold); font-size: 0.9rem; transition: 0.2s;
        }
        .file-box:hover { background: rgba(189, 162, 126, 0.1); border-color: var(--accent-gold); }

        .btn-save {
            width: 100%; background: var(--accent-gold); color: #fff; border: none; padding: 16px;
            font-family: 'Noto Serif KR', serif; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .btn-save:hover { background: #a68c68; }

        /* 게시판 영역 */
        .board-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        
        .post-card {
            background: var(--card-slate); display: flex; flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 1px solid #717c82;
            transition: transform 0.3s;
        }
        .post-card:hover { transform: translateY(-5px); }

        .post-actions-top {
            display: flex; justify-content: flex-end; padding: 10px 15px; gap: 10px;
            background: rgba(0,0,0,0.1); border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .action-btn {
            background: transparent; border: 1px solid rgba(234, 221, 207, 0.3); 
            color: rgba(234, 221, 207, 0.7); padding: 4px 12px; font-size: 0.75rem; 
            cursor: pointer; font-family: 'Noto Serif KR', serif; transition: 0.2s;
        }
        .action-btn:hover { background: var(--accent-gold); color: white; border-color: var(--accent-gold); }
        .action-btn.del:hover { background: #964242; border-color: #964242; }

        .post-img-slot { width: 100%; height: 220px; background: rgba(0,0,0,0.2); overflow: hidden; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.2); font-size: 0.8rem; }
        .post-img { width: 100%; height: 100%; object-fit: cover; }

        .post-content { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
        .post-meta { font-size: 0.8rem; color: var(--accent-gold); margin-bottom: 10px; font-family: 'Playfair Display', serif; text-transform: uppercase; letter-spacing: 1px; }
        .post-title { font-family: 'Noto Serif KR', serif; font-size: 1.3rem; font-weight: 700; color: var(--text-cream); margin-bottom: 15px; line-height: 1.4; }
        .post-text { font-size: 0.95rem; line-height: 1.8; color: #d0d5d8; white-space: pre-wrap; flex-grow: 1; margin-bottom: 20px; }
        .post-date { font-size: 0.8rem; color: rgba(255,255,255,0.4); text-align: right; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
    </style>
</head>
<body>

    <div class="hero-section" id="heroBg">
        <label class="hero-overlay-btn">
            배경 변경
            <input type="file" id="heroInput" hidden accept="image/*">
        </label>
        <h1 class="hero-title">ANNALS</h1>
        <div class="hero-subtitle">Chronicles of the Continents</div>
    </div>

    <div class="search-container">
        <div class="google-search">
            <form action="https://www.google.com/search" method="GET" target="_blank" style="width:100%; display:flex; align-items:center;">
                <input type="text" name="q" placeholder="역사적 사실을 구글에서 검색하세요...">
                <button type="submit">🔍</button>
            </form>
        </div>
        
        <div class="local-search">
            <span>⚲</span>
            <input type="text" id="localSearchInput" placeholder="내 기록 안에서 키워드 찾기..." onkeyup="filterRecords()">
        </div>
    </div>

    <nav>
        <button class="nav-btn active" onclick="setFilter('전체', this)">전체보기</button>
        <button class="nav-btn" onclick="setFilter('아시아', this)">아시아</button>
        <button class="nav-btn" onclick="setFilter('유럽', this)">유럽</button>
        <button class="nav-btn" onclick="setFilter('아프리카', this)">아프리카</button>
        <button class="nav-btn" onclick="setFilter('북아메리카', this)">북아메리카</button>
        <button class="nav-btn" onclick="setFilter('남아메리카', this)">남아메리카</button>
        <button class="nav-btn" onclick="setFilter('오세아니아', this)">오세아니아</button>
    </nav>

    <div class="container">
        <div class="editor-card">
            <h2 class="editor-header">Add a Record</h2>
            <div class="input-row">
                <select id="postContinent">
                    <option value="아시아">아시아</option>
                    <option value="유럽">유럽</option>
                    <option value="아프리카">아프리카</option>
                    <option value="북아메리카">북아메리카</option>
                    <option value="남아메리카">남아메리카</option>
                    <option value="오세아니아">오세아니아</option>
                </select>
                <input type="text" id="postTitle" placeholder="기록의 제목을 입력하세요">
            </div>

            <div class="file-box" onclick="document.getElementById('postFileInput').click()" id="fileBoxText">
                + 관련 역사 사진 또는 문서 첨부
            </div>
            <input type="file" id="postFileInput" hidden accept="image/*">
            
            <textarea id="postContent" placeholder="상세한 역사적 기록을 남겨주세요..." oninput="autoResize(this)"></textarea>
            
            <button class="btn-save" onclick="saveRecord()">기록 보존하기</button>
        </div>

        <div class="board-grid" id="boardGrid">
            </div>
    </div>

    <script>
        let currentFilter = '전체'; 
        let selectedImg = "";
        let editIndex = -1;

        document.getElementById('heroInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    document.getElementById('heroBg').style.backgroundImage = `url(${ev.target.result})`;
                    localStorage.setItem('annals_hero_bg', ev.target.result);
                };
                reader.readAsDataURL(file);
            }
        });

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        document.getElementById('postFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => { 
                    selectedImg = ev.target.result; 
                    document.getElementById('fileBoxText').innerHTML = "✔️ 이미지 첨부 완료 (클릭 시 교체)";
                    document.getElementById('fileBoxText').style.borderColor = "var(--accent-gold)";
                    document.getElementById('fileBoxText').style.color = "var(--text-cream)";
                };
                reader.readAsDataURL(file);
            }
        });

        // 💡 혁신 1단계: 검색어와 대륙 메뉴를 동시에 고려하는 필터 함수
        function filterRecords() {
            renderRecords(); 
        }

        function setFilter(continent, btnElement) {
            currentFilter = continent;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            renderRecords();
        }

        function saveRecord() {
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            const continent = document.getElementById('postContinent').value; 
            
            if(!title || !content) { alert("제목과 내용을 입력해주세요."); return; }

            const records = JSON.parse(localStorage.getItem('annals_history_data') || '[]');
            const today = new Date();
            const dateStr = `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;

            const data = { continent, title, content, img: selectedImg, date: dateStr };

            if(editIndex > -1) { records[editIndex] = data; editIndex = -1; }
            else { records.unshift(data); }

            localStorage.setItem('annals_history_data', JSON.stringify(records));
            resetForm();
            renderRecords();
        }

        function resetForm() {
            document.getElementById('postTitle').value = '';
            const contentBox = document.getElementById('postContent');
            contentBox.value = ''; contentBox.style.height = '120px'; 
            document.getElementById('postContinent').value = '아시아'; 
            selectedImg = "";
            document.getElementById('fileBoxText').innerHTML = "+ 관련 역사 사진 또는 문서 첨부";
            document.getElementById('fileBoxText').style.borderColor = "rgba(234, 221, 207, 0.3)";
            document.getElementById('fileBoxText').style.color = "var(--accent-gold)";
        }

        function editRecord(index) {
            const records = JSON.parse(localStorage.getItem('annals_history_data') || '[]');
            const r = records[index];
            document.getElementById('postTitle').value = r.title;
            document.getElementById('postContinent').value = r.continent; 
            
            const contentBox = document.getElementById('postContent');
            contentBox.value = r.content;
            autoResize(contentBox); 
            
            selectedImg = r.img || "";
            if(r.img) {
                document.getElementById('fileBoxText').innerHTML = "✔️ 기존 이미지 유지 (클릭 시 교체)";
                document.getElementById('fileBoxText').style.color = "var(--text-cream)";
            } else {
                document.getElementById('fileBoxText').innerHTML = "+ 관련 역사 사진 또는 문서 첨부";
            }
            editIndex = index;
            window.scrollTo({top: 400, behavior: 'smooth'});
        }

        function deleteRecord(index) {
            if(confirm("이 역사적 기록을 정말 삭제하시겠습니까?")) {
                const records = JSON.parse(localStorage.getItem('annals_history_data') || '[]');
                records.splice(index, 1);
                localStorage.setItem('annals_history_data', JSON.stringify(records));
                renderRecords();
            }
        }

        function renderRecords() {
            const board = document.getElementById('boardGrid'); 
            board.innerHTML = '';
            const records = JSON.parse(localStorage.getItem('annals_history_data') || '[]');
            
            // 사용자가 입력한 검색어 가져오기
            const searchQuery = document.getElementById('localSearchInput').value.toLowerCase();
            
            records.forEach((r, index) => {
                // 1차 필터: 대륙 메뉴
                if(currentFilter !== '전체' && r.continent !== currentFilter) return;
                
                // 2차 필터: 검색어 (제목이나 내용에 검색어가 포함되어 있는지 확인)
                if(searchQuery) {
                    const titleMatch = r.title.toLowerCase().includes(searchQuery);
                    const contentMatch = r.content.toLowerCase().includes(searchQuery);
                    if(!titleMatch && !contentMatch) return; // 포함되지 않으면 그리지 않음
                }
                
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-actions-top">
                        <button class="action-btn" onclick="editRecord(${index})">Edit</button>
                        <button class="action-btn del" onclick="deleteRecord(${index})">Delete</button>
                    </div>
                    <div class="post-img-slot">
                        ${r.img ? `<img src="${r.img}" class="post-img" onclick="window.open(this.src)">` : 'No Image Recorded'}
                    </div>
                    <div class="post-content">
                        <div class="post-meta">${r.continent}</div>
                        <div class="post-title">${r.title}</div>
                        <div class="post-text">${r.content}</div>
                        <div class="post-date">${r.date}</div>
                    </div>
                `;
                board.appendChild(card);
            });
        }
        
        const savedHero = localStorage.getItem('annals_hero_bg');
        if(savedHero) document.getElementById('heroBg').style.backgroundImage = `url(${savedHero})`;
        
        renderRecords();
    </script>
</body>
</html>
